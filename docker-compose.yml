name: ctm-telegraf-integrate

services:
  db:
    image: ${REGISTRY:-203.228.107.184:5000}/btx/edge-hmi-db:${DB_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: hmi-db-postgres
    environment:
      TZ: ${TZ:-Asia/Jakarta}
      POSTGRES_DB: edge_hmi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1q2w3e4r
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - edge_hmi_data:/var/lib/postgresql/data
      - edge_hmi_backups:/opt/edge-hmi/db/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d edge_hmi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mosquitto:
    image: ${REGISTRY:-203.228.107.184:5000}/mosquitto:${MQTT_IMAGE_TAG:-v1.0.0}
    pull_policy: always
    container_name: mqtt-mosquitto
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_DASHBOARD_PORT:-9883}:9883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "127.0.0.1", "-t", "healthcheck", "-m", "ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  ctm_telegraf_integrate:
    image: ${REGISTRY:-203.228.107.184:5000}/btx/ctm_telegraf_integrate:${CTM_TELEGRAF_INTEGRATE_IMAGE_TAG:-1.0.2}
    pull_policy: always
    container_name: ctm_telegraf_integrate
    environment:
      TZ: ${TZ:-Asia/Jakarta}
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-x", "telegraf"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  status_observer:
    image: ${REGISTRY:-203.228.107.184:5000}/btx/ctm_telegraf_integrate:${CTM_TELEGRAF_INTEGRATE_IMAGE_TAG:-1.0.2}
    pull_policy: always
    container_name: ctm_status_observer
    command: ["python3", "-u", "/telegraf/telegraf_py/status_observer.py"]
    environment:
      TZ: ${TZ:-Asia/Jakarta}
      DB_CONFIG: ${STATUS_OBSERVER_DB_CONFIG:-host=hmi-db-postgres dbname=edge_hmi user=admin password=1q2w3e4r connect_timeout=5}
      MQTT_HOST: ${STATUS_OBSERVER_MQTT_HOST:-mosquitto}
      MQTT_PORT: ${STATUS_OBSERVER_MQTT_PORT:-1883}
      STATUS_OBSERVER_SYSTEM_SENSOR_CODES: ${STATUS_OBSERVER_SYSTEM_SENSOR_CODES:-PYTHON_SYSTEM}
      STATUS_OBSERVER_OFFLINE_TIMEOUT_S: ${STATUS_OBSERVER_OFFLINE_TIMEOUT_S:-5}
      STATUS_OBSERVER_CHECK_INTERVAL_S: ${STATUS_OBSERVER_CHECK_INTERVAL_S:-1}
      STATUS_OBSERVER_STARTUP_GRACE_S: ${STATUS_OBSERVER_STARTUP_GRACE_S:-5}
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

volumes:
  edge_hmi_data:
  edge_hmi_backups:
  mosquitto_data:
  mosquitto_log:
