[agent]
  omit_hostname = true

[[inputs.file]]
  name_override = "mqtt_measurement"
  files = ["/work/tests/fixtures/measurement.json"]
  data_format = "json"
  json_string_fields = ["*"]

  [inputs.file.tags]
    line_code = "LO054"
    equip_name = "MC02"
    station = "1"
    source = "iot_temp"

[[inputs.file]]
  files = ["/work/tests/fixtures/status.json"]
  data_format = "json_v2"

  [[inputs.file.json_v2]]
    measurement_name = "mqtt_status"

    [[inputs.file.json_v2.object]]
      path = "sensors"
      disable_prepend_keys = true
      included_keys = [
        "sensor_code",
        "conn_status",
        "last_seen",
        "health_score",
        "error_msg",
        "update_time",
      ]

      [inputs.file.json_v2.object.fields]
        sensor_code = "string"
        conn_status = "string"
        last_seen = "string"
        health_score = "float"
        error_msg = "string"
        update_time = "string"

  [inputs.file.tags]
    line_code = "LO054"
    equip_name = "MC02"
    station = "1"
    source = "iot_temp"
    status_suffix = "status"

[[processors.execd]]
  namepass = ["mqtt_measurement"]
  command = ["python3", "-u", "/telegraf/telegraf_py/measurement_processor.py"]

[[processors.execd]]
  namepass = ["mqtt_status"]
  command = ["python3", "-u", "/telegraf/telegraf_py/status_processor.py"]

[[outputs.file]]
  files = ["stdout"]
  data_format = "influx"
